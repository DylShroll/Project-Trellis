<div id="reflection-banner"
     class="border-l-4 border-gilt bg-sandstone rounded-r-card px-5 py-4 mb-6 flex items-start justify-between gap-4">
  <div>
    <p class="text-xs text-loam/40 uppercase tracking-widest mb-1">Reflect</p>
    <p class="font-accent text-base text-bark leading-snug">{{ prompt }}</p>
  </div>
  <button
    onclick="document.getElementById('reflection-banner').remove()"
    class="text-loam/30 hover:text-bark transition-colors text-sm flex-shrink-0 mt-0.5"
    aria-label="Dismiss"
  >✕</button>
</div>

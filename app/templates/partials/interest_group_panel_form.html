<div id="interest-group-form-container" class="mb-3 bg-sandstone rounded-card border border-light-sage p-4">
  <form
    hx-post="/garden/{{ plot_id }}/interest-groups/new"
    hx-target="#interest-group-form-container"
    hx-swap="outerHTML"
    class="space-y-3"
  >
    <div>
      <label class="block text-xs font-medium text-bark mb-1">Interest group</label>
      <select
        name="group_type"
        id="group-type-select"
        class="w-full rounded-lg border border-light-sage bg-white px-3 py-2 text-sm text-loam
               focus:outline-none focus:ring-2 focus:ring-sage-green focus:border-transparent"
        onchange="document.getElementById('custom-label-row').style.display = this.value === 'Custom' ? 'block' : 'none'"
      >
        <option value="">— Choose a group —</option>
        {% for cat in category_order %}
          <option value="{{ cat }}">{{ category_icons.get(cat, '·') }} {{ cat }}</option>
        {% endfor %}
        <option value="Custom">· Custom</option>
      </select>
    </div>

    <div id="custom-label-row" style="display:none">
      <label class="block text-xs font-medium text-bark mb-1">Custom label</label>
      <input
        name="custom_label" type="text" maxlength="100"
        placeholder="e.g. Art & Design"
        class="w-full rounded-lg border border-light-sage bg-white px-3 py-2 text-sm text-loam
               focus:outline-none focus:ring-2 focus:ring-sage-green focus:border-transparent"
      />
    </div>

    <div class="flex gap-2 pt-1">
      <button
        type="submit"
        class="text-sm bg-deep-moss text-cream px-4 py-1.5 rounded-lg hover:bg-bark transition-colors"
      >Add group</button>
      <button
        type="button"
        onclick="document.getElementById('interest-group-form-container').remove()"
        class="text-sm text-loam/50 hover:text-bark transition-colors px-2"
      >Cancel</button>
    </div>
  </form>
</div>

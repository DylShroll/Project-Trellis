<nav class="bg-deep-moss text-cream sticky top-0 z-50 shadow-md">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="/" class="font-heading text-xl font-bold tracking-tight text-cream hover:text-light-sage transition-colors">
      🌿 Trellis
    </a>

    <!-- Desktop nav links -->
    <div class="hidden md:flex items-center gap-6 text-sm font-medium">
      <a href="/"
         class="hover:text-light-sage transition-colors {% if request.url.path == '/' %}text-light-sage{% endif %}">
        Dashboard
      </a>
      <a href="/garden"
         class="hover:text-light-sage transition-colors {% if request.url.path.startswith('/garden') %}text-light-sage{% endif %}">
        Garden
      </a>
      <a href="/journal"
         class="hover:text-light-sage transition-colors {% if request.url.path.startswith('/journal') %}text-light-sage{% endif %}">
        Journal
      </a>
    </div>

    <!-- Right side: auth-aware -->
    <div class="flex items-center gap-3">
      {% if user %}
        <!-- Notification bell -->
        <div class="relative">
          <button
            hx-get="/notifications/dropdown"
            hx-target="#notif-dropdown"
            hx-swap="innerHTML"
            class="relative p-1.5 text-light-sage hover:text-cream transition-colors"
            aria-label="Notifications"
          >
            🔔
            {% if unread_count and unread_count > 0 %}
              <span id="notif-badge"
                    hx-get="/notifications/badge"
                    hx-trigger="every 60s"
                    hx-swap="outerHTML"
                    class="absolute -top-1 -right-1 bg-warm-clay text-cream text-xs w-4 h-4 rounded-full flex items-center justify-center font-medium">
                {{ unread_count }}
              </span>
            {% else %}
              <span id="notif-badge"
                    hx-get="/notifications/badge"
                    hx-trigger="every 60s"
                    hx-swap="outerHTML">
              </span>
            {% endif %}
          </button>
          <!-- Dropdown container -->
          <div id="notif-dropdown"
               class="absolute right-0 mt-1 w-72 bg-white border border-light-sage rounded-card shadow-lg z-50 overflow-hidden hidden"
               _="on click from outside me add .hidden to me">
          </div>
        </div>

        <!-- User dropdown -->
        <div class="relative group">
          <button class="flex items-center gap-1.5 text-sm text-cream hover:text-light-sage transition-colors">
            <span>{{ user.display_name }}</span>
            <span class="text-xs text-light-sage/60">▾</span>
          </button>
          <div class="absolute right-0 mt-1 w-40 bg-white border border-light-sage rounded-card shadow-lg z-50 overflow-hidden
                      invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-150">
            <a href="/profile"
               class="block px-4 py-2.5 text-sm text-loam hover:bg-sandstone transition-colors">
              Profile
            </a>
            <form hx-post="/auth/logout" hx-target="body" hx-swap="none"
                  hx-on::after-request="window.location.href='/auth/login'">
              <button type="submit"
                      class="w-full text-left px-4 py-2.5 text-sm text-warm-clay hover:bg-sandstone transition-colors border-t border-light-sage">
                Sign out
              </button>
            </form>
          </div>
        </div>
      {% else %}
        <a href="/auth/login" class="text-sm text-light-sage hover:text-cream transition-colors">Sign in</a>
      {% endif %}
    </div>
  </div>
</nav>

<!-- Mobile bottom nav (shown only on small screens) -->
{% if user %}
<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-deep-moss border-t border-deep-moss/80 shadow-lg">
  <div class="flex items-center justify-around px-2 py-2">
    <a href="/"
       class="flex flex-col items-center gap-0.5 px-4 py-1 {% if request.url.path == '/' %}text-cream{% else %}text-light-sage/60{% endif %} hover:text-cream transition-colors">
      <span class="text-xl leading-none">🏠</span>
      <span class="text-xs font-medium">Home</span>
    </a>
    <a href="/garden"
       class="flex flex-col items-center gap-0.5 px-4 py-1 {% if request.url.path.startswith('/garden') %}text-cream{% else %}text-light-sage/60{% endif %} hover:text-cream transition-colors">
      <span class="text-xl leading-none">🌱</span>
      <span class="text-xs font-medium">Garden</span>
    </a>
    <a href="/journal"
       class="flex flex-col items-center gap-0.5 px-4 py-1 {% if request.url.path.startswith('/journal') %}text-cream{% else %}text-light-sage/60{% endif %} hover:text-cream transition-colors">
      <span class="text-xl leading-none">📖</span>
      <span class="text-xs font-medium">Journal</span>
    </a>
    {% if unread_count and unread_count > 0 %}
      <a href="/notifications"
         class="flex flex-col items-center gap-0.5 px-4 py-1 {% if request.url.path.startswith('/notifications') %}text-cream{% else %}text-light-sage/60{% endif %} hover:text-cream transition-colors relative">
        <span class="text-xl leading-none relative">
          🔔
          <span class="absolute -top-1 -right-1 bg-warm-clay text-cream text-xs w-4 h-4 rounded-full flex items-center justify-center font-medium">
            {{ unread_count }}
          </span>
        </span>
        <span class="text-xs font-medium">Alerts</span>
      </a>
    {% endif %}
  </div>
</nav>
{% endif %}

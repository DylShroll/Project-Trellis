<nav class="bg-deep-moss text-cream sticky top-0 z-50 trellis-nav">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">

    <!-- Wordmark -->
    <a href="/" class="flex items-center gap-2 group">
      <!-- Art Nouveau leaf mark -->
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" class="opacity-80 group-hover:opacity-100 transition-opacity" aria-hidden="true">
        <path d="M11,2 C11,2 4,7 4,13 C4,17.4 7.1,20 11,20 C14.9,20 18,17.4 18,13 C18,7 11,2 11,2Z" stroke="#C49A78" stroke-width="1.1" fill="none"/>
        <path d="M11,20 L11,10" stroke="#C49A78" stroke-width="0.9" opacity="0.7"/>
        <path d="M11,14 C11,14 8,12 7,9" stroke="#C49A78" stroke-width="0.7" opacity="0.5"/>
        <path d="M11,12 C11,12 14,10 15,8" stroke="#C49A78" stroke-width="0.7" opacity="0.5"/>
      </svg>
      <span class="font-display text-xl font-semibold tracking-wide text-cream group-hover:text-gilt transition-colors">
        Trellis
      </span>
    </a>

    <!-- Desktop nav links -->
    <div class="hidden md:flex items-center gap-6 text-sm font-medium">
      <a href="/"
         class="hover:text-gilt transition-colors {% if request.url.path == '/' %}text-gilt{% else %}text-cream/70{% endif %}">
        Dashboard
      </a>
      <a href="/garden"
         class="hover:text-gilt transition-colors {% if request.url.path.startswith('/garden') %}text-gilt{% else %}text-cream/70{% endif %}">
        Garden
      </a>
      <a href="/journal"
         class="hover:text-gilt transition-colors {% if request.url.path.startswith('/journal') %}text-gilt{% else %}text-cream/70{% endif %}">
        Journal
      </a>
    </div>

    <!-- Right side: auth-aware -->
    <div class="flex items-center gap-3">
      {% if user %}
        <!-- Notification bell -->
        <div class="relative">
          <button
            hx-get="/notifications/dropdown"
            hx-target="#notif-dropdown"
            hx-swap="innerHTML"
            class="relative p-1.5 text-cream/60 hover:text-gilt transition-colors"
            aria-label="Notifications"
          >
            <!-- Bell icon (SVG, no emoji) -->
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9,1.5 C9,1.5 9,1.5 9,1.5 C6.5,1.5 4.5,3.5 4.5,6 L4.5,9 L3,12 L15,12 L13.5,9 L13.5,6 C13.5,3.5 11.5,1.5 9,1.5Z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
              <path d="M7.2,12 C7.2,13 8,13.8 9,13.8 C10,13.8 10.8,13 10.8,12" stroke="currentColor" stroke-width="1.1" fill="none"/>
            </svg>
            {% if unread_count and unread_count > 0 %}
              <span id="notif-badge"
                    hx-get="/notifications/badge"
                    hx-trigger="every 60s"
                    hx-swap="outerHTML"
                    class="absolute -top-0.5 -right-0.5 bg-gilt text-bark text-xs w-4 h-4 rounded-full flex items-center justify-center font-semibold">
                {{ unread_count }}
              </span>
            {% else %}
              <span id="notif-badge"
                    hx-get="/notifications/badge"
                    hx-trigger="every 60s"
                    hx-swap="outerHTML">
              </span>
            {% endif %}
          </button>
          <!-- Dropdown container -->
          <div id="notif-dropdown"
               class="absolute right-0 mt-1 w-72 bg-white border border-light-sage rounded-card shadow-lg z-50 overflow-hidden hidden"
               _="on click from outside me add .hidden to me">
          </div>
        </div>

        <!-- Divider -->
        <span class="h-4 w-px bg-cream/20"></span>

        <!-- User dropdown -->
        <div class="relative group">
          <button class="flex items-center gap-1.5 text-sm text-cream/70 hover:text-gilt transition-colors">
            <span class="font-display italic">{{ user.display_name }}</span>
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" class="text-cream/40 group-hover:text-gilt/60 transition-colors mt-px">
              <path d="M1,1 L5,5 L9,1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="absolute right-0 mt-2 w-44 bg-white border border-light-sage rounded-card shadow-xl z-50 overflow-hidden
                      invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-150">
            <!-- Ornamental top rule -->
            <div class="h-0.5 w-full" style="background: linear-gradient(to right, transparent, rgba(196,154,120,0.5), transparent);"></div>
            <a href="/profile"
               class="block px-4 py-2.5 text-sm text-loam hover:bg-sandstone transition-colors">
              Profile
            </a>
            <div class="h-px bg-light-sage/60 mx-3"></div>
            <form hx-post="/auth/logout" hx-target="body" hx-swap="none"
                  hx-on::after-request="window.location.href='/auth/login'">
              <button type="submit"
                      class="w-full text-left px-4 py-2.5 text-sm text-warm-clay hover:bg-sandstone transition-colors">
                Sign out
              </button>
            </form>
          </div>
        </div>
      {% else %}
        <a href="/auth/login" class="text-sm text-cream/60 hover:text-gilt transition-colors font-display italic">Sign in</a>
      {% endif %}
    </div>
  </div>
</nav>

<!-- Mobile bottom nav -->
{% if user %}
<nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-deep-moss trellis-nav">
  <div class="flex items-center justify-around px-2 py-2">
    <a href="/"
       class="flex flex-col items-center gap-0.5 px-4 py-1 {% if request.url.path == '/' %}text-gilt{% else %}text-cream/50{% endif %} hover:text-gilt transition-colors">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3,9 L10,2 L17,9 L17,18 L13,18 L13,13 L7,13 L7,18 L3,18 Z"/>
      </svg>
      <span class="text-xs font-medium">Home</span>
    </a>
    <a href="/garden"
       class="flex flex-col items-center gap-0.5 px-4 py-1 {% if request.url.path.startswith('/garden') %}text-gilt{% else %}text-cream/50{% endif %} hover:text-gilt transition-colors">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
        <path d="M10,2 C10,2 4,7 4,12 C4,15.3 6.7,18 10,18 C13.3,18 16,15.3 16,12 C16,7 10,2 10,2Z"/>
        <path d="M10,18 L10,10"/>
        <path d="M10,14 C10,14 7.5,12 7,9"/>
        <path d="M10,12 C10,12 12.5,10.5 13,8"/>
      </svg>
      <span class="text-xs font-medium">Garden</span>
    </a>
    <a href="/journal"
       class="flex flex-col items-center gap-0.5 px-4 py-1 {% if request.url.path.startswith('/journal') %}text-gilt{% else %}text-cream/50{% endif %} hover:text-gilt transition-colors">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="2" width="14" height="16" rx="2"/>
        <path d="M7,7 L13,7 M7,10 L13,10 M7,13 L10,13"/>
      </svg>
      <span class="text-xs font-medium">Journal</span>
    </a>
    {% if unread_count and unread_count > 0 %}
      <a href="/notifications"
         class="flex flex-col items-center gap-0.5 px-4 py-1 {% if request.url.path.startswith('/notifications') %}text-gilt{% else %}text-cream/50{% endif %} hover:text-gilt transition-colors relative">
        <span class="relative">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10,2 C7.2,2 5,4.2 5,7 L5,10 L3.5,13.5 L16.5,13.5 L15,10 L15,7 C15,4.2 12.8,2 10,2Z"/>
            <path d="M8,13.5 C8,14.6 8.9,15.5 10,15.5 C11.1,15.5 12,14.6 12,13.5"/>
          </svg>
          <span class="absolute -top-1 -right-1 bg-gilt text-bark text-xs w-4 h-4 rounded-full flex items-center justify-center font-semibold">
            {{ unread_count }}
          </span>
        </span>
        <span class="text-xs font-medium">Alerts</span>
      </a>
    {% endif %}
  </div>
</nav>
{% endif %}

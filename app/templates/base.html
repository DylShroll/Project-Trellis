<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Trellis{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Inter:wght@400;500&family=Caveat:wght@400&display=swap" rel="stylesheet" />

  <!-- Tailwind via CDN (Phase 1; replaced with build in Phase 3) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'deep-moss':   '#2D3A2E',
            'warm-clay':   '#B5694D',
            'sage-green':  '#7A8B6F',
            'cream':       '#F5F0E8',
            'bark':        '#5C4A3A',
            'loam':        '#3E3229',
            'light-sage':  '#D4DDD0',
            'sandstone':   '#E8DFD0',
            'golden-hour': '#C9973E',
          },
          fontFamily: {
            heading: ['Fraunces', 'Georgia', 'serif'],
            body:    ['Inter', 'system-ui', 'sans-serif'],
            accent:  ['Caveat', 'cursive'],
          },
          borderRadius: {
            card: '12px',
          },
        }
      }
    }
  </script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <!-- App JS -->
  <script src="/static/js/app.js" defer></script>

  {% block head %}{% endblock %}
</head>
<body class="h-full bg-cream text-loam font-body antialiased">
  {% include "partials/nav.html" %}

  <main class="min-h-full">
    {% include "partials/flash.html" %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>

{% extends "base.html" %}
{% block title %}Create Account · Trellis{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <!-- Art Nouveau botanical garland -->
      <svg class="mx-auto mb-5" viewBox="0 0 220 40" width="220" height="40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <ellipse cx="110" cy="20" rx="5.5" ry="10" fill="#8B6A96" opacity="0.5"/>
        <ellipse cx="110" cy="20" rx="10" ry="5.5" fill="#8B6A96" opacity="0.5"/>
        <circle cx="110" cy="20" r="3.5" fill="#C49A78" opacity="0.75"/>
        <path d="M104,20 C92,17 77,9 60,17" stroke="#3B1F4A" stroke-width="0.9" opacity="0.38"/>
        <ellipse cx="82" cy="12" rx="5.5" ry="2.5" fill="#3B1F4A" opacity="0.2" transform="rotate(-18,82,12)"/>
        <circle cx="60" cy="17" r="6.5" fill="none" stroke="#C49A78" stroke-width="0.9" opacity="0.5"/>
        <circle cx="60" cy="17" r="2.5" fill="#C49A78" opacity="0.55"/>
        <path d="M53,17 L10,17" stroke="#3B1F4A" stroke-width="0.4" opacity="0.25"/>
        <circle cx="10" cy="17" r="1.8" fill="#C49A78" opacity="0.4"/>
        <path d="M116,20 C128,17 143,9 160,17" stroke="#3B1F4A" stroke-width="0.9" opacity="0.38"/>
        <ellipse cx="138" cy="12" rx="5.5" ry="2.5" fill="#3B1F4A" opacity="0.2" transform="rotate(18,138,12)"/>
        <circle cx="160" cy="17" r="6.5" fill="none" stroke="#C49A78" stroke-width="0.9" opacity="0.5"/>
        <circle cx="160" cy="17" r="2.5" fill="#C49A78" opacity="0.55"/>
        <path d="M167,17 L210,17" stroke="#3B1F4A" stroke-width="0.4" opacity="0.25"/>
        <circle cx="210" cy="17" r="1.8" fill="#C49A78" opacity="0.4"/>
      </svg>

      <h1 class="font-display text-4xl font-semibold text-bark">Start your garden</h1>
      <p class="mt-2 text-sm text-loam/60 font-body">A quiet place to tend your relationships</p>
    </div>

    <div class="bg-white rounded-card shadow-sm border border-light-sage p-8 nouveau-auth-card">
      <form
        hx-post="/auth/register/web"
        hx-target="#form-error"
        hx-swap="innerHTML"
        class="space-y-5"
      >
        <div id="form-error" class="text-warm-clay text-sm"></div>

        <div>
          <label for="display_name" class="block text-sm font-medium text-bark mb-1">Your name</label>
          <input
            id="display_name" name="display_name" type="text" required
            class="w-full rounded-lg border border-light-sage bg-sandstone px-4 py-2.5 text-sm text-loam
                   focus:outline-none focus:ring-2 focus:ring-sage-green focus:border-transparent"
            placeholder="How should we call you?"
          />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-bark mb-1">Email</label>
          <input
            id="email" name="email" type="email" required autocomplete="email"
            class="w-full rounded-lg border border-light-sage bg-sandstone px-4 py-2.5 text-sm text-loam
                   focus:outline-none focus:ring-2 focus:ring-sage-green focus:border-transparent"
            placeholder="you@example.com"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-bark mb-1">Password</label>
          <input
            id="password" name="password" type="password" required autocomplete="new-password"
            minlength="8"
            class="w-full rounded-lg border border-light-sage bg-sandstone px-4 py-2.5 text-sm text-loam
                   focus:outline-none focus:ring-2 focus:ring-sage-green focus:border-transparent"
            placeholder="At least 8 characters"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-warm-clay text-cream font-medium py-2.5 rounded-lg hover:bg-bark transition-colors text-sm tracking-wide"
        >
          Create Account
        </button>
      </form>
    </div>

    <p class="mt-6 text-center text-sm text-loam/60">
      Already have an account?
      <a href="/auth/login" class="text-warm-clay hover:text-bark transition-colors hover:underline">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
